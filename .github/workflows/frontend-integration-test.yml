# ============================================================================
# GitHub Actions: Frontend統合テストワークフロー
# Description: プルリクエスト時にPlaywrightでフロントエンド統合テストを実行
# Trigger: プルリクエスト（mainブランチ向け）
# ============================================================================

name: Frontend Integration Test

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  frontend-integration-test:
    name: Frontend統合テスト（Playwright）
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v5

      - name: Node.jsのセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/frontend/package-lock.json

      - name: フロントエンド依存パッケージのインストール
        run: npm ci
        working-directory: frontend

      - name: E2Eテスト依存パッケージのインストール
        run: npm ci
        working-directory: e2e/frontend

      - name: Playwrightブラウザのインストール
        run: npx playwright install chromium --with-deps
        working-directory: e2e/frontend

      - name: フロントエンドのビルド
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8080

      - name: フロントエンドサーバーの起動
        run: npm run start &
        working-directory: frontend
        env:
          PORT: 3000

      - name: フロントエンドサーバーの起動待機
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "フロントエンドサーバーが起動しました"
              exit 0
            fi
            echo "起動待機中... ($i/30)"
            sleep 2
          done
          echo "フロントエンドサーバーの起動がタイムアウトしました"
          exit 1

      - name: Frontend統合テスト実行
        run: npx playwright test
        working-directory: e2e/frontend
        env:
          FRONTEND_URL: http://localhost:3000
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8080

      - name: テストレポートのアップロード
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: frontend-integration-test-report
          path: |
            e2e/frontend/reports/
            e2e/frontend/test-results/
          retention-days: 7
