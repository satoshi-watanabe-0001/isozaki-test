# ============================================================================
# GitHub Actions: E2Eテストワークフロー
# Description: プルリクエスト時にDocker環境でE2Eテストを実行
# Trigger: プルリクエスト（mainブランチ向け）
# ============================================================================

name: Backend E2E Test

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  e2e-test:
    name: Backend E2Eテスト（Docker環境）
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v5

      - name: Docker Composeでサービスを起動
        run: |
          docker compose up -d --build --wait backend frontend image-processor
          docker compose up minio-init
        timeout-minutes: 10

      - name: サービスの起動状態を確認
        run: docker compose ps

      - name: Backend E2Eテスト実行
        run: |
          chmod +x ./e2e/backend/e2e-test.sh
          ./e2e/backend/e2e-test.sh
        timeout-minutes: 5

      - name: アプリケーションログの出力（失敗時）
        if: failure()
        run: docker compose logs backend

      - name: 全サービスログの出力（失敗時）
        if: failure()
        run: docker compose logs

      - name: テストレポートのアップロード
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: backend-e2e-test-report
          path: e2e/backend/reports/
          retention-days: 7

      - name: Docker Composeの停止
        if: always()
        run: docker compose down -v
