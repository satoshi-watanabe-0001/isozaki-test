# ============================================================================
# GitHub Actions: 単体テストワークフロー
# Description: プルリクエスト時にGradleで単体テストとJaCoCoカバレッジ検証を実行
# Trigger: プルリクエスト（mainブランチ向け）
# ============================================================================

name: Unit Test

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  unit-test:
    name: 単体テスト・カバレッジ検証
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v5

      - name: JDK 17のセットアップ
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradleキャッシュの設定
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Gradleラッパーに実行権限を付与
        run: chmod +x ./backend/gradlew

      - name: 単体テスト実行
        run: ./backend/gradlew -p backend test jacocoTestReport jacocoTestCoverageVerification

      - name: テストレポートのアップロード
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: unit-test-report
          path: |
            backend/build/reports/tests/test/
            backend/build/reports/jacoco/test/html/
          retention-days: 7

  frontend-test:
    name: フロントエンド単体テスト
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v5

      - name: Node.jsのセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 依存パッケージのインストール
        run: npm ci
        working-directory: frontend

      - name: フロントエンドテスト実行（カバレッジ付き）
        run: npx vitest run --coverage
        working-directory: frontend

      - name: テストレポートのアップロード
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: frontend-test-report
          path: |
            frontend/test-results/junit-report.xml
            frontend/test-results/html/
          retention-days: 7

      - name: カバレッジレポートのアップロード
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: frontend-coverage-report
          path: frontend/test-results/coverage/
          retention-days: 7
