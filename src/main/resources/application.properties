# アプリケーション設定
quarkus.application.name=user-auth-app

# PostgreSQL データソース設定
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:userauth}

# Hibernate ORM設定
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.database.charset=UTF-8
quarkus.hibernate-orm.jdbc.statement-batch-size=50

# Redis設定
quarkus.redis.hosts=redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}

# HTTPサーバ設定
quarkus.http.port=8080
quarkus.http.cors.enabled=true

# ロギング設定
quarkus.log.level=INFO
quarkus.log.category."com.isozaki".level=DEBUG
