# テスト用アプリケーション設定
quarkus:
  # H2インメモリデータベース（テスト用）
  datasource:
    db-kind: h2
    username: sa
    password: ""
    jdbc:
      url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL

  # Hibernate ORM テスト設定
  hibernate-orm:
    database:
      generation: drop-and-create
    log:
      sql: true

  # Redis設定を無効化（テスト時はモックを使用）
  redis:
    hosts: redis://localhost:6379
    devservices:
      enabled: false

  # ロギング設定
  log:
    level: INFO
    category:
      "com.isozaki":
        level: DEBUG
    console:
      json: false

  # アクセスログ設定（テスト時は無効）
  http:
    access-log:
      enabled: false
