# アプリケーション設定
quarkus:
  application:
    name: user-auth-app

  # PostgreSQL データソース設定
  datasource:
    db-kind: postgresql
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    jdbc:
      url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:userauth}

  # Hibernate ORM設定
  hibernate-orm:
    database:
      generation: none
      charset: UTF-8
    log:
      sql: false
    jdbc:
      statement-batch-size: 50

  # Redis設定
  redis:
    hosts: redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}

  # HTTPサーバ設定
  http:
    port: 8080
    cors:
      enabled: true
      origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
      methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
      headers: Content-Type,Authorization,Accept
      exposed-headers: Content-Type
      access-control-max-age: 24H
    access-log:
      enabled: true
      pattern: "%h %l %u %t \"%r\" %s %b \"%{i,Referer}\" \"%{i,User-Agent}\" %D"

  # ロギング設定
  log:
    level: INFO
    category:
      "com.isozaki":
        level: DEBUG
    console:
      json: true

  # ヘルスチェック設定
  smallrye-health:
    root-path: /q/health

# S3（MinIO）設定
# AWS環境ではendpoint, public-endpoint, access-key, secret-keyは未設定とし、
# IAMロール認証とSDKデフォルトエンドポイントを使用する。
# image-base-urlにはCloudFrontのURLを設定する。
s3:
  endpoint: ${S3_ENDPOINT:}
  public-endpoint: ${S3_PUBLIC_ENDPOINT:}
  image-base-url: ${S3_IMAGE_BASE_URL:}
  bucket: ${S3_BUCKET:images}
  access-key: ${S3_ACCESS_KEY:}
  secret-key: ${S3_SECRET_KEY:}
  region: ${S3_REGION:ap-northeast-1}
